<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexCuiDev | 关于我</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --bg-page: #0d1117;
            --bg-card: #161b22;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --accent: #58a6ff;
            --border-line: #30363d;
            --radius: 16px;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.7;
            padding: 40px 20px;
        }

        /* 导航复用样式 */
        header {
            max-width: 1100px;
            margin: 0 auto 40px;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-logo {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        nav a {
            margin-left: 2rem;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 15px;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* 简历主体 */
        .resume-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 50px;
            border: 1px solid var(--border-line);
        }

        .resume-header {
            display: flex;
            gap: 30px;
            align-items: center;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-line);
            margin-bottom: 30px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--border-line);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            font-size: 14px;
        }

        .info h1 {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .info p {
            color: var(--text-sub);
            font-size: 15px;
        }

        .resume-section {
            margin-bottom: 35px;
        }

        .resume-section h2 {
            font-size: 18px;
            border-left: 4px solid var(--accent);
            padding-left: 12px;
            margin-bottom: 18px;
        }

        .resume-section p {
            color: var(--text-sub);
            font-size: 15px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .item {
            padding-left: 10px;
            border-left: 2px solid var(--border-line);
        }

        .item h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .item span {
            font-size: 14px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

<header>
    <div class="site-logo">AlexCuiDev</div>
    <nav>
        <a href="index.html">首页</a>
        <a href="#">博客</a>
        <a href="about.html">关于我</a>
    </nav>
</header>

    <div class="resume-container">
        <div class="resume-header">
            <div class="avatar">头像占位</div>
            <div class="info">
                <h1>Alex Cui</h1>
                <p>坐标 | 职业方向 | 联系方式</p>
            </div>
        </div>

        <div class="resume-section">
            <h2>个人简介</h2>
            <p>在此填写个人简介、从业年限、擅长领域、职业定位等内容。</p>
        </div>

        <div class="resume-section">
            <h2>专业技能</h2>
            <p>在此罗列技术栈、软件能力、编程语言、行业技能等。</p>
        </div>

        <div class="resume-section">
            <h2>工作经历</h2>
            <div class="item-list">
                <div class="item">
                    <h3>公司 / 岗位</h3>
                    <span>任职时间</span>
                    <p>工作内容、负责项目、主要业绩。</p>
                </div>
            </div>
        </div>

        <div class="resume-section">
            <h2>教育背景</h2>
            <div class="item-list">
                <div class="item">
                    <h3>院校 / 专业 / 学历</h3>
                    <span>就读时间</span>
                </div>
            </div>
        </div>

        <div class="resume-section">
            <h2>项目经历</h2>
            <p>在此填写参与过的项目、负责模块、技术亮点。</p>
        </div>
    </div>

</body>
</html>
