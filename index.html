<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexCuiDev | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --bg-page: #f6f3ec;
            --bg-card: #ffffff;
            --text-main: #1c1c1c;
            --text-sub: #666666;
            --accent: #406b60;
            --radius: 18px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        body {
            background: var(--bg-page);
            color: var(--text-main);
        }

        /* 顶部导航 */
        header {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-logo {
            font-size: 18px;
            font-weight: 600;
        }

        nav a {
            margin-left: 2rem;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 15px;
        }

        nav a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* 大号主卡片 */
        .hero-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 4rem 3rem;
            box-shadow: var(--shadow);
            margin-bottom: 2.5rem;
        }

        /* 栏目区块 */
        .section-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 3rem;
            box-shadow: var(--shadow);
            margin-bottom: 2.5rem;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .grid-item {
            background: var(--bg-page);
            border-radius: 12px;
            padding: 1.5rem;
        }

        /* 响应式适配 */
        @media (max-width:768px) {
            .grid-row {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            nav a {
                margin: 0 0.8rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="site-logo">AlexCuiDev</div>
    <nav>
        <a href="#">首页</a>
        <a href="#">博客</a>
        <a href="#">关于</a>
    </nav>
</header>

<div class="container">
    <!-- 主大卡片 留白 -->
    <div class="hero-card">
        <!-- 以后在这里填标题、介绍、按钮 -->
    </div>

    <!-- 三格栏目区域 空排版 -->
    <div class="section-card">
        <!-- 以后填栏目标题 -->
        <div class="grid-row">
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
        </div>
    </div>
</div>

</body>
</html>
