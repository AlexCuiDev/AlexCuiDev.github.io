<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexCuiDev | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 2rem;
        }
        .intro {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #58a6ff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .links a:hover {
            background-color: #58a6ff;
            color: #0d1117;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hi, I'm AlexCuiDev 👋</h1>
        <p class="subtitle">Developer / Learner / Builder</p>
        <p class="intro">
            欢迎来到我的个人主页！<br>
            我是 Alex，一个热爱技术的开发者，这里会分享我的项目和学习记录。
        </p>
        <div class="links">
            <a href="https://github.com/AlexCuiDev" target="_blank">我的 GitHub</a>
        </div>
    </div>
</body>
</html>
