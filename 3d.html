<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维模型展示 | 崔小建</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --radius: 10px;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航 —— 完全和你主页一样 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13,17,23,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 999;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
            font-size: 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* 页面标题区域 */
        .page-hero {
            padding-top: 140px;
            padding-bottom: 60px;
            text-align: center;
        }

        .page-hero h1 {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* 区块通用 */
        .section {
            padding: 20px 0 80px 0;
        }

        /* 卡片 */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .card h3 {
            color: var(--accent);
            margin-bottom: 8px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width:768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .nav-links a {
                margin-left: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- 导航栏（和你主页完全一样） -->
    <header>
        <div class="container nav">
            <div class="logo">AlexCuiDev</div>
            <div class="nav-links">
                <a href="index.html#home">首页</a>
                <a href="index.html#about">关于我</a>
                <a href="index.html#skills">技能</a>
                <a href="index.html#experience">经历</a>
                <a href="3d.html" style="color:var(--accent);">三维模型</a>
                <a href="https://github.com/AlexCuiDev" target="_blank">GitHub</a>
            </div>
        </div>
    </header>

    <!-- 页面内容 -->
    <div class="page-hero">
        <div class="container">
            <h1>三维模型展示</h1>
            <p>CATIA / 3DEXPERIENCE 工程模型 | BIM 构件 | 自动化开发成果</p>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="grid">
                <div class="card">
                    <h3>桥梁钢结构参数化模型</h3>
                    <p>基于达索3DE平台开发，支持自动建模、批量生成与尺寸驱动</p>
                </div>
                <div class="card">
                    <h3>BIM正向设计桥梁模型</h3>
                    <p>完整BIM信息集成，适用于设计、施工、运维全流程</p>
                </div>
                <div class="card">
                    <h3>市政预制构件库</h3>
                    <p>标准化构件，CATIA二次开发自动排布与出图</p>
                </div>
                <div class="card">
                    <h3>道路/附属设施工程模型</h3>
                    <p>3DE平台一体化建模，支持工程量自动统计</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
